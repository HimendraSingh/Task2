<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Maincrafts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Maincrafts</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        <div class="form-container">
            <h2>Contact Us</h2>
            <p>Feel free to drop a message. We will get back to you shortly.</p>
            
            <form name="contactForm" onsubmit="return validateForm()">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <textarea name="message" rows="5" placeholder="Enter your message"></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Maincrafts Technology. Developed & Designed by Himendra Singh.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
